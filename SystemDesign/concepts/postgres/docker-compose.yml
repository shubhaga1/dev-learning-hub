version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-local
    environment:
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB:       learndb
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data:
